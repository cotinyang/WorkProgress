<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InnoSilo Portal | 个人服务中心</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'media',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <!-- Google Fonts Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-outfit {
        font-family: 'Outfit', sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-all duration-300 flex flex-col justify-between relative overflow-x-hidden antialiased">
    <!-- Gradient background accents -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-200/30 dark:bg-indigo-900/10 rounded-full blur-[120px] -z-10"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-emerald-200/20 dark:bg-emerald-900/5 rounded-full blur-[120px] -z-10"></div>

    <!-- Main Container -->
    <main class="max-w-6xl mx-auto px-6 py-16 flex-grow flex flex-col justify-center w-full">
      <!-- Header Section -->
      <div class="text-center mb-16">
        <div class="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-full bg-indigo-50 dark:bg-indigo-950/40 border border-indigo-100 dark:border-indigo-900/40 text-xs font-semibold text-indigo-600 dark:text-indigo-400 mb-6 tracking-wide uppercase">
          <i data-lucide="server" class="w-3.5 h-3.5"></i> InnoSilo Services
        </div>
        <h1 class="text-4xl md:text-5xl font-black font-outfit text-slate-950 dark:text-white tracking-tight mb-4 leading-tight">
          个人服务导航中心
        </h1>
        <p class="text-slate-500 dark:text-slate-400 max-w-lg mx-auto text-sm md:text-base font-medium">
          欢迎回来。这里汇集了您部署的各项日常开发辅助工具及自建网络服务。
        </p>
      </div>

      <!-- Services Grid (Symmetrical 3-Column) -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full">
        <!-- 1. 工作时间进度 -->
        <a href="/progress" class="group block bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800/80 p-6 shadow-[0_8px_30px_rgb(0,0,0,0.015)] dark:shadow-none hover:border-indigo-500/30 dark:hover:border-indigo-500/30 hover:shadow-[0_8px_30px_rgba(79,70,229,0.06)] dark:hover:shadow-[0_8px_30px_rgba(79,70,229,0.1)] transition-all duration-300 transform hover:-translate-y-1">
          <div class="flex items-start justify-between">
            <div class="w-12 h-12 rounded-2xl bg-indigo-50 dark:bg-indigo-950/50 text-indigo-600 dark:text-indigo-400 flex items-center justify-center transition-colors group-hover:bg-indigo-600 group-hover:text-white dark:group-hover:bg-indigo-600">
              <i data-lucide="clock" class="w-6 h-6"></i>
            </div>
            <span class="text-xs font-bold text-slate-400 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors flex items-center gap-1">
              进入服务 <i data-lucide="arrow-right" class="w-3 h-3"></i>
            </span>
          </div>
          <h3 class="text-lg font-bold text-slate-900 dark:text-white mt-5">工作时间进度</h3>
          <p class="text-xs text-slate-500 dark:text-slate-400 mt-2.5 leading-relaxed">
            高精度出勤进度看板。智能剔除法定节假日、调休补班，并支持当月可用额度及排班控制。
          </p>
        </a>

        <!-- 2. 开发者工具箱 -->
        <a href="/devtools" class="group block bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800/80 p-6 shadow-[0_8px_30px_rgb(0,0,0,0.015)] dark:shadow-none hover:border-violet-500/30 dark:hover:border-violet-500/30 hover:shadow-[0_8px_30px_rgba(139,92,246,0.06)] dark:hover:shadow-[0_8px_30px_rgba(139,92,246,0.1)] transition-all duration-300 transform hover:-translate-y-1">
          <div class="flex items-start justify-between">
            <div class="w-12 h-12 rounded-2xl bg-violet-50 dark:bg-violet-950/50 text-violet-600 dark:text-violet-400 flex items-center justify-center transition-colors group-hover:bg-violet-600 group-hover:text-white dark:group-hover:bg-violet-600">
              <i data-lucide="wrench" class="w-6 h-6"></i>
            </div>
            <span class="text-xs font-bold text-slate-400 group-hover:text-violet-600 dark:group-hover:text-violet-400 transition-colors flex items-center gap-1">
              进入服务 <i data-lucide="arrow-right" class="w-3 h-3"></i>
            </span>
          </div>
          <h3 class="text-lg font-bold text-slate-900 dark:text-white mt-5">开发者工具箱</h3>
          <p class="text-xs text-slate-500 dark:text-slate-400 mt-2.5 leading-relaxed">
            开发辅助工具集合。提供编码转换、格式化等一系列日常开发中实用的轻量小工具。
          </p>
        </a>

        <!-- 3. 实时天气服务 -->
        <a href="/weather" class="group block bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800/80 p-6 shadow-[0_8px_30px_rgb(0,0,0,0.015)] dark:shadow-none hover:border-emerald-500/30 dark:hover:border-emerald-500/30 hover:shadow-[0_8px_30px_rgba(16,185,129,0.06)] dark:hover:shadow-[0_8px_30px_rgba(16,185,129,0.1)] transition-all duration-300 transform hover:-translate-y-1">
          <div class="flex items-start justify-between">
            <div class="w-12 h-12 rounded-2xl bg-emerald-50 dark:bg-emerald-950/50 text-emerald-600 dark:text-emerald-400 flex items-center justify-center transition-colors group-hover:bg-emerald-600 group-hover:text-white dark:group-hover:bg-emerald-600">
              <i data-lucide="cloud-sun" class="w-6 h-6"></i>
            </div>
            <span class="text-xs font-bold text-slate-400 group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors flex items-center gap-1">
              进入服务 <i data-lucide="arrow-right" class="w-3 h-3"></i>
            </span>
          </div>
          <h3 class="text-lg font-bold text-slate-900 dark:text-white mt-5">实时天气服务</h3>
          <p class="text-xs text-slate-500 dark:text-slate-400 mt-2.5 leading-relaxed">
            本地气象看板服务。调用精细化天气源，为您展示本地的实时气象、温度湿度和多天预报。
          </p>
        </a>
      </div>
    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-8 text-xs text-slate-400 dark:text-slate-600 border-t border-slate-100 dark:border-slate-900/50 bg-white/30 dark:bg-slate-950/30 backdrop-blur-sm">
      <p class="font-outfit">&copy; 2026 InnoSilo. All rights reserved.</p>
    </footer>

    <!-- Initialize Lucide Icons -->
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
